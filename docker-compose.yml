services:
  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/cf-runner:/tmp/cf-runner
    # Prerequisite: build the sandbox image first
    #   docker build -f runner/sandbox.Dockerfile -t codeforge-sandbox runner/

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codeforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
